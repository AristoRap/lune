name: Demo
app_entry: src/main.cr
icon: ../assets/lune-logo.png
frontend:
  dir: frontend
  install: npm install
  build: npm run build
  dev:
    cmd: npm run dev
    url: http://localhost:5173
mac:
  sign: "Developer ID Application: Your Name (TEAMID)" # enables UNUserNotificationCenter
  notarize: false

url_schemes:
  - lune-demo

capabilities:
  # Capabilities listed below are not yet implemented on Windows. Uncomment them
  # in the `exclude` block when running the demo on Windows; on macOS/Linux all
  # capabilities work so the default config leaves them enabled.
  # As each Win32 implementation lands, remove the corresponding entry here.
  # See ROADMAP.md ("Production-ready/Windows support") and
  # website/guide/windows-checklist.md for the current state.
  # exclude:
  #   - file_watch    # Windows: needs ReadDirectoryChangesW
  #   - file_drop     # Windows: needs IDropTarget + disable_webview_drop port
  #   - tray          # Windows: needs Shell_NotifyIconW
  #   - drag_out      # macOS-only by design
  #   - context_menu  # Windows: needs TrackPopupMenuEx + WM_COMMAND dispatch
  #   - deep_link     # Windows: needs registry scheme registration + warm-start forwarding
