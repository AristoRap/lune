name: Specs

on:
  push:
    branches:
      - main
    paths-ignore:
      - "website/**"
      - "package.json"
      - "package-lock.json"
      - "**.md"
  pull_request:
    paths-ignore:
      - "website/**"
      - "package.json"
      - "package-lock.json"
      - "**.md"

env:
  SQLITE_DLL_URL: "https://www.sqlite.org/2024/sqlite-dll-win-x64-3450000.zip"

jobs:
  specs:
    name: crystal-spec (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            spec_flags: "-Dpreview_mt -Dexecution_context"
          - os: macos-latest
            spec_flags: "-Dpreview_mt -Dexecution_context"
          - os: windows-latest
            spec_flags: "-Dpreview_mt -Dexecution_context"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libnotify-dev

      # ─── Windows: stage native deps + patch Crystal stdlib ──────────────
      # Three things `crystal spec` needs on Windows that aren't available
      # out of the box on `windows-latest`:
      #   1. WebView2 SDK headers (CPATH)
      #   2. sqlite3.lib + webview.lib (LIB) — for the linker
      #   3. Crystal stdlib patch for Process.initialize PidT (until 1.21)
      # All of this lives in WINDOWS_SETUP.md; the steps below automate it.

      - name: Setup MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Patch Crystal stdlib for LibC::PidT (Windows, pre-1.21)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Crystal 1.20.x MSVC stdlib references LibC::PidT in
          # Process.initialize, which doesn't exist on Windows. Fixed upstream
          # in crystal-lang/crystal#16933 (Crystal 1.21.0). Until that ships,
          # patch the installed stdlib by dropping the type annotation.
          # Idempotent — re-running on a patched / future-fixed stdlib is a no-op.
          $stdlib = (& crystal env CRYSTAL_PATH).Split(';') | Where-Object { $_ -and (Test-Path (Join-Path $_ "process.cr")) } | Select-Object -First 1
          if (-not $stdlib) {
            Write-Error "Could not locate Crystal stdlib via 'crystal env CRYSTAL_PATH'"
            exit 1
          }
          $processFile = Join-Path $stdlib "process.cr"
          Write-Host "Patching $processFile"
          $content = Get-Content $processFile -Raw
          $patched = $content -replace 'def initialize\(pid : LibC::PidT\)', 'def initialize(pid)'
          if ($content -ne $patched) {
            Set-Content -Path $processFile -Value $patched -NoNewline
            Write-Host "Applied LibC::PidT workaround"
          } else {
            Write-Host "Stdlib already patched (or Crystal >= 1.21) — skipping"
          }

      - name: Install WebView2 SDK headers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -OutputDirectory "$env:RUNNER_TEMP\webview2"
          $includeDir = (Get-ChildItem "$env:RUNNER_TEMP\webview2" -Filter "Microsoft.Web.WebView2.*" | Select-Object -First 1).FullName
          "CPATH=$includeDir\build\native\include" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Stage sqlite3.lib (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sqliteDir = "$env:RUNNER_TEMP\sqlite3"
          New-Item -ItemType Directory -Path $sqliteDir -Force | Out-Null
          $zip = "$env:RUNNER_TEMP\sqlite-dll.zip"
          Invoke-WebRequest -Uri "${{ env.SQLITE_DLL_URL }}" -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $sqliteDir -Force
          Push-Location $sqliteDir
          & lib /def:sqlite3.def /machine:x64 /out:sqlite3.lib
          Pop-Location
          "$sqliteDir" | Out-File -FilePath $env:GITHUB_PATH -Append
          "SQLITE_LIB_DIR=$sqliteDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install shards (Unix)
        if: runner.os != 'Windows'
        run: shards install

      - name: Install shards (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # --skip-postinstall: vendored webview shard's postinstall hook is
        # a Unix Makefile-based build. On Windows we build webview.lib
        # ourselves in the next step.
        run: shards install --skip-postinstall

      - name: Build webview.lib from vendored fork source (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # We track the AristoRap/lune-webview fork via shards (see
        # shard.yml). After `shards install` the fork's webview.cc +
        # webview.h are in `lib/webview/ext/`. Compile with cl.exe +
        # /DWEBVIEW_STATIC so WEBVIEW_API resolves to `extern` (default
        # is `inline` for C++, which produces a symbol-less .lib), then
        # archive into webview.lib. Mirrors WINDOWS_SETUP.md step 4b.
        run: |
          $ext = "$env:GITHUB_WORKSPACE\lib\webview\ext"
          Push-Location $ext
          cl.exe /nologo /c /EHsc /MD /std:c++17 /DWEBVIEW_STATIC `
            /I"$env:CPATH" webview.cc /Fo:webview.obj
          if ($LASTEXITCODE -ne 0) { throw "cl.exe failed" }
          lib /nologo /OUT:webview.lib webview.obj
          if ($LASTEXITCODE -ne 0) { throw "lib.exe failed" }
          Pop-Location
          # Stage on LIB and also at Crystal\lib\ — the Crystal linker
          # passes /LIBPATH:Crystal\lib before LIB env walk, so a stale
          # copy there would win regardless of LIB. Always overwrite both.
          # Crystal's lib dir lives next to crystal.exe in some packages
          # (flat layout: <root>\crystal.exe + <root>\lib\ — what the
          # crystal-lang/install-crystal action on GitHub Actions uses)
          # and one level up in others (Unix-style: <root>\bin\crystal.exe
          # + <root>\lib\). Probe both before failing.
          $crystalRoot = Split-Path (Get-Command crystal).Source -Parent
          $crystalLib = $null
          foreach ($candidate in @("$crystalRoot\..\lib", "$crystalRoot\lib")) {
            if (Test-Path $candidate) {
              $crystalLib = (Resolve-Path $candidate).Path
              break
            }
          }
          if (-not $crystalLib) { throw "Could not find Crystal lib dir near $crystalRoot" }
          Copy-Item "$ext\webview.lib" -Destination $crystalLib -Force
          "WEBVIEW_LIB_DIR=$ext" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LIB=$env:SQLITE_LIB_DIR;$ext;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Run all specs
        run: crystal spec -Dlune_native_test_mock ${{ matrix.spec_flags }}

      # The spec run uses `lune_native_test_mock`, which short-circuits the
      # native Win32 paths in src/lune/native/*. To make sure the real native
      # code still type-checks (i.e. nobody broke a win32 macro branch by
      # accident), do a `--no-codegen` build of the CLI without the mock flag.
      - name: Type-check real Windows build
        if: runner.os == 'Windows'
        run: crystal build src/lune_cli.cr ${{ matrix.spec_flags }} --no-codegen
