name: Specs

on:
  push:
    branches:
      - main
    paths-ignore:
      - "website/**"
      - "package.json"
      - "package-lock.json"
      - "**.md"
  pull_request:
    paths-ignore:
      - "website/**"
      - "package.json"
      - "package-lock.json"
      - "**.md"

jobs:
  specs:
    name: crystal-spec (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            spec_flags: "-Dpreview_mt -Dexecution_context"
          - os: macos-latest
            spec_flags: "-Dpreview_mt -Dexecution_context"
          - os: windows-latest
            spec_flags: "-Dpreview_mt -Dexecution_context"
            compile_check_only: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libnotify-dev

      - name: Install WebView2 SDK headers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -OutputDirectory "$env:RUNNER_TEMP\webview2"
          $includeDir = (Get-ChildItem "$env:RUNNER_TEMP\webview2" -Filter "Microsoft.Web.WebView2.*" | Select-Object -First 1).FullName
          "CPATH=$includeDir\build\native\include" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install shards
        run: shards install

      - name: Run all specs
        if: ${{ !matrix.compile_check_only }}
        run: crystal spec -D lune_native_test_mock ${{ matrix.spec_flags }}

      # Tried to actually run specs on Windows in v0.11.0 but Crystal 1.20.2
      # MSVC stdlib errors with "undefined constant LibC::PidT" when
      # expanding Process#initialize. Out of our hands — see PR #8 history.
      # Keep the mocked + real compile-checks until Crystal fixes upstream.
      - name: Type-check mocked build (Windows)
        if: ${{ matrix.compile_check_only }}
        run: crystal build src/lune_cli.cr -D lune_native_test_mock ${{ matrix.spec_flags }} --no-codegen

      - name: Type-check real Windows build
        if: ${{ matrix.compile_check_only }}
        run: crystal build src/lune_cli.cr ${{ matrix.spec_flags }} --no-codegen
