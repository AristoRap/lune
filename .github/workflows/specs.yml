name: Specs

on:
  push:
    branches:
      - main
    paths-ignore:
      - "website/**"
      - "package.json"
      - "package-lock.json"
      - "**.md"
  pull_request:
    paths-ignore:
      - "website/**"
      - "package.json"
      - "package-lock.json"
      - "**.md"

jobs:
  specs:
    name: crystal-spec (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            spec_flags: "-Dpreview_mt -Dexecution_context"
          - os: macos-latest
            spec_flags: "-Dpreview_mt -Dexecution_context"
          - os: windows-latest
            spec_flags: "-Dpreview_mt -Dexecution_context"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libnotify-dev

      - name: Setup MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install WebView2 SDK headers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -OutputDirectory "$env:RUNNER_TEMP\webview2"
          $includeDir = (Get-ChildItem "$env:RUNNER_TEMP\webview2" -Filter "Microsoft.Web.WebView2.*" | Select-Object -First 1).FullName
          "WEBVIEW2_INCLUDE=$includeDir\build\native\include" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install shards
        run: shards install

      # Crystal/MSVC links against webview.lib by name (the webview shard uses
      # `@[Link("webview")]` on Windows). The upstream shard ships only the C++
      # source — we build it with cl.exe and place webview.lib next to the
      # .cc file, then append that directory to %LIB% so the Crystal linker
      # finds it during `crystal spec`.
      - name: Build webview.lib (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cl.exe /nologo /c /EHsc /std:c++17 /I "%WEBVIEW2_INCLUDE%" lib\webview\ext\webview.cc /Fo:lib\webview\ext\webview.obj
          if errorlevel 1 exit /b 1
          lib.exe /nologo /OUT:lib\webview\ext\webview.lib lib\webview\ext\webview.obj
          if errorlevel 1 exit /b 1
          echo LIB=%LIB%;%CD%\lib\webview\ext>> %GITHUB_ENV%

      - name: Run all specs
        run: crystal spec -D lune_native_test_mock ${{ matrix.spec_flags }}
