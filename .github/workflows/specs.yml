name: Specs

on:
  push:
    branches:
      - main
    paths-ignore:
      - "website/**"
      - "package.json"
      - "package-lock.json"
      - "**.md"
  pull_request:
    paths-ignore:
      - "website/**"
      - "package.json"
      - "package-lock.json"
      - "**.md"

jobs:
  specs:
    name: crystal-spec (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            spec_flags: "-Dpreview_mt -Dexecution_context"
          - os: macos-latest
            spec_flags: "-Dpreview_mt -Dexecution_context"
          - os: windows-latest
            spec_flags: "-Dpreview_mt -Dexecution_context"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libnotify-dev

      - name: Setup MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install WebView2 SDK headers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          nuget install Microsoft.Web.WebView2 -OutputDirectory "$env:RUNNER_TEMP\webview2"
          $includeDir = (Get-ChildItem "$env:RUNNER_TEMP\webview2" -Filter "Microsoft.Web.WebView2.*" | Select-Object -First 1).FullName
          # CPATH: picked up by MinGW g++ during the webview shard's postinstall
          #   make step (which fails without it: "WebView2.h: No such file…")
          # WEBVIEW2_INCLUDE: used by our own cl.exe step below.
          "CPATH=$includeDir\build\native\include"            | Out-File -FilePath $env:GITHUB_ENV -Append
          "WEBVIEW2_INCLUDE=$includeDir\build\native\include" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Build the upstream webview project per its documented Windows
      # instructions (webview/webview → script/build.bat). This downloads
      # its own WebView2 NuGet, produces dll/x64/webview.lib (MSVC import
      # lib) + webview.dll (runtime). We run this BEFORE shards install so
      # the shard's postinstall `make` step on Windows — which would
      # otherwise compile a MinGW .a we can't link against — can be
      # bypassed safely later.
      - name: Build upstream webview (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/webview/webview %RUNNER_TEMP%\webview-upstream
          if errorlevel 1 exit /b 1
          call %RUNNER_TEMP%\webview-upstream\script\build.bat
          if errorlevel 1 exit /b 1
          dir %RUNNER_TEMP%\webview-upstream\dll\x64
          echo LIB=%LIB%;%RUNNER_TEMP%\webview-upstream\dll\x64>> %GITHUB_ENV%
          echo PATH=%PATH%;%RUNNER_TEMP%\webview-upstream\dll\x64>> %GITHUB_ENV%

      - name: Install shards
        run: shards install

      - name: Run all specs
        run: crystal spec -D lune_native_test_mock ${{ matrix.spec_flags }}
