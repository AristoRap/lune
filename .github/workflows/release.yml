name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: lune-linux-x86_64
          - os: macos-latest
            artifact: lune-darwin-arm64
          # macos-13 (Intel) runner is unreliable on GitHub Actions — commented out until a stable solution is found
          # - os: macos-13
          #   artifact: lune-darwin-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libnotify-dev

      - name: Install shards
        run: shards install

      - name: Build release binary
        run: shards build --release -Dpreview_mt -Dexecution_context

      - name: Stage artifact
        run: cp bin/lune ${{ matrix.artifact }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
